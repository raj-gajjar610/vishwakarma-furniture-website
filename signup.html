<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Sign Up | VISHWAKARMA FURNITURE</title>

<style>

/* ================= RESET ================= */
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

/* ================= BODY ================= */
body{
    height:100vh;
    font-family:'Poppins', sans-serif;

    display:flex;
    align-items:center;
    justify-content:center;

    overflow:hidden;
}

/* ================= VIDEO ================= */
.bg-video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

/* OVERLAY */
.video-overlay{
    position:fixed;
    inset:0;
    background:linear-gradient(
        to bottom,
        rgba(0,0,0,0.6),
        rgba(0,0,0,0.85)
    );
    z-index:-1;
}

/* ================= BOX ================= */
.signup-container{
    position:relative;
    z-index:2;

    width:380px;
    padding:50px;

    border-radius:24px;

    background:rgba(255,255,255,0.08);
    backdrop-filter:blur(22px);

    border:1px solid rgba(255,255,255,0.15);

    box-shadow:
        0 25px 80px rgba(0,0,0,0.5),
        inset 0 1px 0 rgba(255,255,255,0.1);

    animation:fadeUp 0.6s ease;
}

/* ANIMATION */
@keyframes fadeUp{
    from{opacity:0; transform:translateY(20px);}
    to{opacity:1; transform:translateY(0);}
}

/* ================= TITLE ================= */
.signup-title{
    text-align:center;
    font-size:24px;
    letter-spacing:5px;
    color:#fff;
    margin-bottom:30px;
}

/* ================= INPUT ================= */
.form-control{
    width:100%;
    padding:14px;
    margin-bottom:18px;

    background:rgba(255,255,255,0.1);
    border:1px solid rgba(255,255,255,0.2);
    border-radius:14px;

    color:#fff;
    font-size:14px;

    transition:0.3s;
}

.form-control::placeholder{
    color:#bbb;
}

/* FOCUS PREMIUM */
.form-control:focus{
    outline:none;
    border-color:#c6a96b;
    box-shadow:0 0 0 2px rgba(198,169,107,0.2);
    background:rgba(255,255,255,0.12);
}

/* ================= BUTTON ================= */
.btn-gold{
    width:65%;
    padding:12px;

    margin:25px auto 0;
    display:block;

    background:#c6a96b;
    border:none;
    border-radius:30px;

    color:#fff;
    font-weight:500;
    font-size:14px;
    letter-spacing:2px;

    transition:0.3s;
}

.btn-gold:hover{
    background:#111;
    transform:translateY(-2px);
    box-shadow:0 10px 25px rgba(198,169,107,0.3);
}

/* ================= LINK ================= */
.login-link{
    text-align:center;
    margin-top:20px;
    font-size:14px;
}

.login-link a{
    color:#c6a96b;
    text-decoration:none;
}

.login-link a:hover{
    color:#fff;
}

</style>

</head>

<body>

<!-- VIDEO BACKGROUND -->
<video autoplay muted loop playsinline class="bg-video">
    <source src="{% static 'videos/hero.mp4' %}" type="video/mp4">
</video>

<div class="video-overlay"></div>

<!-- SIGNUP BOX -->
<div class="signup-container">

<form method="post">
{% csrf_token %}

<h2 class="signup-title">SIGN UP</h2>

<input type="text" name="username" class="form-control" placeholder="Username" required>

<input type="email" name="email" class="form-control" placeholder="Email" required>

<input type="password" name="password" class="form-control" placeholder="Password" required>

<button type="submit" class="btn-gold">Create Account</button>

<div class="login-link">
<a href="/login">Already registered</a>
</div>

</form>

</div>

</body>
</html>
