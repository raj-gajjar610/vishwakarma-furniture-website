<!DOCTYPE html>
{% load static %}
<html lang="en">
<head>

<style>

/* ================= BODY ================= */
body{
    margin:0;
    background:#f4f4f4;
    font-family:'Poppins', sans-serif;
    color:#111;
}

/* ================= SECTION ================= */
.wishlist-section{
    padding-top:120px;
    padding-bottom:80px;
}

/* TITLE */
.wishlist-title{
    font-size:34px;
    letter-spacing:6px;
    font-weight:300;
    text-align:center;
    margin-bottom:70px;
}

/* ================= GRID ================= */
.wishlist-grid{
    width:85%;
    margin:auto;

    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:40px;
}

/* ================= CARD ================= */
.wishlist-card{
    background:#fff;
    padding:22px;
    border-radius:22px;

    border:1px solid #eee;

    transition:0.35s ease;
}

/* HOVER */
.wishlist-card:hover{
    transform:translateY(-6px);
    box-shadow:
        0 25px 50px rgba(0,0,0,0.08);
}

/* ================= IMAGE ================= */
.wishlist-card img{
    width:100%;
    height:220px;
    object-fit:cover;
    border-radius:14px;
    margin-bottom:18px;

    transition:0.5s;
}

.wishlist-card:hover img{
    transform:scale(1.05);
}

/* ================= TEXT ================= */
.product-name{
    font-size:17px;
    letter-spacing:2px;
    margin-bottom:6px;
}

.price{
    color:#777;
    margin-bottom:18px;
}

/* ================= BUTTON GROUP ================= */
.wishlist-actions{
    display:flex;
    justify-content:center;
    gap:10px;
    flex-wrap:wrap;
}

/* BUTTON BASE */
.wishlist-actions a{
    padding:9px 16px;
    border-radius:30px;
    border:1px solid #ddd;

    color:#111;
    font-size:12px;
    text-decoration:none;

    transition:0.3s;
}

/* PRIMARY GOLD BUTTON */
.wishlist-actions a:nth-child(2){
    background:#c6a96b;
    border:none;
    color:#fff;
}

/* HOVER */
.wishlist-actions a:hover{
    transform:scale(1.05);
}

/* GOLD HOVER */
.wishlist-actions a:nth-child(2):hover{
    background:#111;
}

/* REMOVE */
.remove-link{
    color:#c94b4b !important;
}

/* EMPTY */
.empty-box{
    text-align:center;
    margin-top:60px;
    color:#777;
}

/* ================= RESPONSIVE ================= */
@media(max-width:900px){
    .wishlist-grid{
        grid-template-columns:repeat(2,1fr);
    }
}

@media(max-width:600px){
    .wishlist-grid{
        grid-template-columns:1fr;
    }
}

</style>

<title>VISHWAKARMA FURNITURE</title>

<link rel="stylesheet" href="{% static 'css/menu.css' %}">

</head>

<body>

<!-- NAVBAR -->
<nav class="custom-navbar">
    <a href="/" class="navbar-brand">VISHWAKARMA FURNITURE</a>

    <div class="menu-items">
        <a href="/">HOME</a>
        <a href="/category">CATEGORY</a>
        <a href="/about">ABOUT</a>
        <a href="/contact">CONTACT</a>
        <a href="/view_cart">CART</a>
        <a href="/wishlist">WISHLIST</a>
        <a href="/login">LOGIN</a>
    </div>
</nav>

<!-- WISHLIST -->
<section class="wishlist-section">

<h2 class="wishlist-title">YOUR WISHLIST</h2>

<div class="wishlist-grid">

{% for item in wishlist_items %}

<div class="wishlist-card">

<img src="{{ item.s_id.image_set.first.image.url }}">

<h4 class="product-name">{{ item.s_id.s_name }}</h4>

<p class="price">₹ {{ item.s_id.price }}</p>

<div class="wishlist-actions">

<a href="/product_detail/{{ item.s_id.s_id }}/">View</a>

<a href="/add_to_cart/{{ item.s_id.s_id }}/">Add to Cart</a>

<a href="/remove_wishlist/{{ item.w_id }}/" class="remove-link">Remove</a>

</div>

</div>

{% empty %}

<div class="empty-box">
    <h4>Your wishlist is empty</h4>
</div>

{% endfor %}

</div>

</section>

</body>
</html>
